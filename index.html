<!DOCTYPE html>
<html lang="zh-CN">
<head>
<base href="/see/">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>见未见的世界</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  /* ===== 视口自适应缩放 ===== */
  html, body {
    width: 100%; height: 100%;
    background: #000; overflow: hidden;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  #app {
    width: 750px; height: 1440px;
    position: absolute; top: 50%; left: 50%;
    transform-origin: center center;
    overflow: hidden; background: #000;
  }

  /* ===== 背景音乐开关 ===== */
  .bgm-toggle {
    position: absolute; top: 20px; right: 20px;
    width: 50px; height: 50px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    border: 2px solid rgba(255,255,255,0.5);
    z-index: 9999;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.3s ease;
  }
  .bgm-toggle.off { background: rgba(0,0,0,0.4); border-color: rgba(255,255,255,0.2); }
  .bgm-toggle svg { width: 24px; height: 24px; fill: #fff; }

  /* ===== 页面通用 ===== */
  .page {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    display: none; overflow: hidden;
  }
  .page.active { display: block; }
  .page-bg {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }

  /* ===== 页面切换动画 ===== */
  .page-enter { animation: pageIn 0.6s ease forwards; }
  @keyframes pageIn { from { opacity: 0; } to { opacity: 1; } }
  .page-leave { animation: pageOut 0.4s ease forwards; }
  @keyframes pageOut { from { opacity: 1; } to { opacity: 0; } }

  /* ===== 页面1 ===== */
  #page1 { cursor: pointer; }
  #page1 .tap-hint {
    position: absolute; bottom: 120px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.7); font-size: 28px;
    letter-spacing: 4px;
    animation: hintPulse 2s ease-in-out infinite;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    white-space: nowrap;
  }
  @keyframes hintPulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

  /* ===== 页面2：对话 ===== */
  .dialog-container {
    position: absolute; left: 0; top: 916px;
    width: 750px; opacity: 0;
    transition: opacity 0.8s ease; z-index: 10;
  }
  .dialog-container.visible { opacity: 0.8; }
  .dialog-box-img {
    position: absolute; top: 0; left: 0;
    width: 750px; height: 411px;
    object-fit: contain; object-position: top left; z-index: 1;
  }
  .dialog-text {
    position: absolute; left: 112px; top: 121px;
    width: 526px; color: #4A2C0A;
    font-size: 30px; line-height: 1.8;
    text-align: left; min-height: 80px;
    transition: opacity 0.4s ease; z-index: 3;
  }
  .dialog-text.fade-out { opacity: 0; }
  .input-area {
    position: absolute; left: 112px; top: 184px;
    width: 526px;
    display: flex; flex-direction: column; align-items: center;
    opacity: 0; transition: opacity 0.5s ease; z-index: 4;
  }
  .input-area.visible { opacity: 1; }
  .nickname-input {
    width: 420px; height: 56px;
    border: 3px solid #C49A6C; border-radius: 28px;
    background: rgba(255,255,255,0.85);
    padding: 0 24px; font-size: 22px; color: #4A2C0A;
    outline: none; text-align: center; margin-bottom: 8px;
  }
  .nickname-input::placeholder { color: #B8A090; font-size: 20px; }
  .nickname-input:focus { border-color: #8B6914; }
  .submit-btn {
    position: absolute; left: 50%; top: 267px;
    width: 200px; height: auto;
    transform: translateX(-50%);
    object-fit: contain; opacity: 0;
    cursor: pointer; z-index: 5;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }
  .submit-btn.visible { opacity: 1; pointer-events: auto; }
  .submit-btn.hidden { opacity: 0; pointer-events: none; }
  .enter-btn {
    position: absolute; left: 50%; top: 267px;
    width: 200px; z-index: 20; opacity: 0;
    transform: translateX(-50%);
    transition: opacity 0.6s ease; cursor: pointer;
    pointer-events: none;
  }
  .enter-btn.visible { opacity: 1; pointer-events: auto; }
  .enter-btn img { width: 200px; height: auto; object-fit: contain; }
  .typing-cursor {
    display: inline-block; width: 2px; height: 30px;
    background: #4A2C0A; margin-left: 2px;
    vertical-align: middle; animation: blink 0.8s infinite;
  }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
  .nickname-warning {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    z-index: 100; opacity: 0;
    transition: opacity 0.3s ease; pointer-events: none;
  }
  .nickname-warning.visible { opacity: 1; pointer-events: auto; }
  .nickname-warning img { width: 343px; height: 126px; object-fit: contain; }

  /* ===== 页面3：声音地图 ===== */
  .building-overlay {
    position: absolute; z-index: 5;
    transition: opacity 0.5s ease; pointer-events: none;
  }
  .building-overlay.matched { opacity: 0; }
  .drop-zone {
    position: absolute; z-index: 4;
    border: 3px dashed transparent; border-radius: 12px;
    transition: border-color 0.3s ease, background 0.3s ease;
  }
  .drop-zone.highlight { border-color: rgba(255,200,50,0.8); background: rgba(255,200,50,0.15); }
  .drop-zone.matched { opacity: 0; pointer-events: none; }
  .map-hint {
    position: absolute; left: 50%; transform: translateX(-50%);
    bottom: 380px; width: 620px;
    color: #4A2C0A; font-size: 26px; line-height: 1.6;
    text-align: center; z-index: 6;
    text-shadow: 0 1px 4px rgba(255,255,255,0.5);
  }
  .sound-icons {
    position: absolute; top: 1140px;
    left: 50%; transform: translateX(-50%);
    display: flex; gap: 20px; z-index: 10;
  }
  .sound-icon {
    position: relative; cursor: pointer;
    transition: opacity 0.3s ease, transform 0.2s ease;
    touch-action: none; user-select: none; -webkit-user-select: none;
  }
  .sound-icon img { width: 149px; height: 145px; object-fit: contain; pointer-events: none; }
  .sound-icon.disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
  .sound-icon.selected { transform: scale(1.1); filter: brightness(1.2); }
  .sound-icon.dragging { opacity: 1; z-index: 100; position: absolute; transform: scale(1.15); }
  .sound-icon.matched { opacity: 0; pointer-events: none; }

  /* ===== 页面4-7：故事页 ===== */
  .story-box {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 650px; max-height: 1100px;
    background: rgba(80,80,80,0.6);
    border-radius: 24px; padding: 50px 40px;
    z-index: 10; opacity: 0;
    transition: opacity 0.6s ease; overflow-y: auto;
  }
  .story-box.visible { opacity: 1; }
  .story-text { color: #fff; font-size: 26px; line-height: 1.9; text-align: justify; white-space: pre-wrap; }
  .story-text .typing-cursor { background: #fff; height: 26px; }
  .detail-btn {
    position: absolute; bottom: 80px; right: 50px;
    z-index: 20; opacity: 0;
    transition: opacity 0.6s ease; cursor: pointer;
  }
  .detail-btn.visible { opacity: 1; }
  .detail-btn img { width: 180px; height: auto; object-fit: contain; }
  .detail-btn:active img { transform: scale(0.95); }

  /* ===== 页面4b：盲文识别 ===== */
  .p4b-btn-row {
    position: absolute; top: 1177px; left: 0;
    width: 750px;
    display: flex; justify-content: center; gap: 30px;
    z-index: 10;
  }
  .p4b-btn {
    width: 220px; height: 95px;
    cursor: pointer; transition: transform 0.15s ease;
  }
  .p4b-btn:active { transform: scale(0.95); }
  .p4b-btn img { width: 220px; height: 95px; object-fit: contain; }
  .p4b-result {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #fff; font-size: 52px; font-weight: bold;
    z-index: 30; opacity: 0;
    transition: opacity 0.3s ease;
    text-shadow: 0 4px 12px rgba(0,0,0,0.6);
    pointer-events: none;
  }
  .p4b-result.visible { opacity: 1; }

  /* ===== 页面5b：琴键 ===== */
  .p5b-keyboard {
    position: absolute; top: 812px; left: 0;
    width: 750px; height: 366px;
    z-index: 5;
  }
  .p5b-keyboard img { width: 750px; height: 366px; object-fit: fill; }
  .p5b-key-zone {
    position: absolute; top: 0; height: 366px;
    width: calc(750px / 7); /* ~107px each */
    z-index: 6; cursor: pointer;
    background: transparent;
  }
  .p5b-play-btn {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    border: 3px solid rgba(255,255,255,0.6);
    z-index: 15; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s ease, transform 0.15s ease;
  }
  .p5b-play-btn:active { transform: translate(-50%, -50%) scale(0.9); background: rgba(255,255,255,0.4); }
  .p5b-play-btn svg { width: 50px; height: 50px; fill: #fff; }
  .p5b-start-btn {
    position: absolute; top: 1235px; left: 50%;
    transform: translateX(-50%);
    width: 200px; height: auto;
    z-index: 20; cursor: pointer;
  }
  .p5b-start-btn img { width: 200px; height: auto; object-fit: contain; }
  .p5b-retry-btn {
    position: absolute; top: 1235px; left: 50%;
    transform: translateX(-50%);
    width: 200px; height: auto;
    z-index: 20; opacity: 0; cursor: pointer;
    transition: opacity 0.4s ease; pointer-events: none;
  }
  .p5b-retry-btn.visible { opacity: 1; pointer-events: auto; }
  .p5b-retry-btn img { width: 200px; height: auto; object-fit: contain; }
  .p5b-result-img {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 30; opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }
  .p5b-result-img.visible { opacity: 1; }
  .p5b-result-img img { height: 120px; width: auto; object-fit: contain; }

  /* ===== 页面6b：自行车整理 ===== */
  .p6b-item {
    position: absolute; z-index: 10;
    transition: opacity 0.5s ease;
    cursor: pointer;
  }
  .p6b-item.hidden { opacity: 0; pointer-events: none; }
  .p6b-clean-item {
    position: absolute; z-index: 10;
    opacity: 0; transition: opacity 0.5s ease;
    pointer-events: none;
  }
  .p6b-clean-item.visible { opacity: 1; }
  .p6b-tidy-img {
    position: absolute; z-index: 15;
    left: 50%; transform: translateX(-50%);
    opacity: 0; transition: opacity 0.8s ease;
    pointer-events: none;
  }
  .p6b-tidy-img.visible { opacity: 1; }

  /* ===== 页面8 ===== */
  .p8-dialog-container {
    position: absolute; left: 0; top: 916px;
    width: 750px; opacity: 0;
    transition: opacity 0.8s ease; z-index: 10;
  }
  .p8-dialog-container.visible { opacity: 0.8; }
  .p8-dialog-box-img {
    position: absolute; top: 0; left: 0;
    width: 750px; height: 411px;
    object-fit: contain; object-position: top left; z-index: 1;
  }
  .p8-dialog-text {
    position: absolute; left: 112px; top: 121px;
    width: 526px; color: #4A2C0A;
    font-size: 30px; line-height: 1.8;
    text-align: left; min-height: 80px; z-index: 3;
  }
  .p8-dialog-text .typing-cursor { background: #4A2C0A; height: 30px; }
  .p8-next-btn {
    position: absolute; left: 50%; top: 1183px;
    width: 200px; z-index: 999; opacity: 0;
    transform: translateX(-50%);
    transition: opacity 0.6s ease; cursor: pointer;
    pointer-events: none;
  }
  .p8-next-btn.visible { opacity: 1; pointer-events: auto; }
  .p8-next-btn img { width: 200px; height: auto; object-fit: contain; }

  /* ===== 页面9：视频录制 ===== */
  #page9 { position: relative; background: #000; }
  .p9-video {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover; z-index: 1;
  }
  .p9-video.blurred { filter: blur(8px); transition: filter 0.5s ease; }
  .p9-frame {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover; z-index: 2; pointer-events: none;
  }
  .p9-record-btn {
    position: absolute; left: 50%; bottom: 30px;
    width: 150px; height: auto;
    transform: translateX(-50%);
    z-index: 5; cursor: pointer;
  }
  .p9-record-btn img { width: 150px; height: auto; object-fit: contain; }
  .p9-hint-text {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #fff; font-size: 28px; line-height: 1.5;
    text-align: center; z-index: 6;
    text-shadow: 0 2px 6px rgba(0,0,0,0.5);
    white-space: nowrap;
    opacity: 1; transition: opacity 0.3s ease;
  }
  .p9-hint-text.hidden { opacity: 0; pointer-events: none; }
  .p9-next-btn {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 343px; height: 126px;
    z-index: 10; opacity: 0;
    transition: opacity 0.6s ease; cursor: pointer;
  }
  .p9-next-btn.visible { opacity: 1; }
  .p9-next-btn img { width: 343px; height: 126px; object-fit: contain; }

  /* ===== 页面10：发布编辑 ===== */
  #page10 { position: relative; }
  .p10-options {
    position: absolute; left: 75px; top: 590px;
    width: 600px;
    display: flex; flex-direction: column; gap: 40px;
    z-index: 5;
  }
  .p10-option {
    width: 100%; min-height: 100px;
    background: rgba(255,255,255,0.85);
    border-radius: 20px; border: 3px solid transparent;
    display: flex; align-items: center; justify-content: center;
    padding: 20px 28px; cursor: pointer;
    transition: border-color 0.3s ease, transform 0.2s ease;
    font-size: 28px; color: #333;
  }
  .p10-option:active { transform: scale(0.97); }
  .p10-option.selected { border-color: #8B6914; border-radius: 20px; }
  .p10-custom-input {
    width: 100%; border: none; background: transparent;
    font-size: 28px; color: #333; text-align: center; outline: none;
  }
  .p10-custom-input::placeholder { color: #999; }
  .p10-publish-btn {
    position: absolute; left: 50%; bottom: 60px;
    width: 393px; height: 110px;
    transform: translateX(-50%);
    z-index: 10; cursor: pointer;
  }
  .p10-publish-btn img { width: 393px; height: 110px; object-fit: contain; }

  /* ===== 页面11：发布成功 ===== */
  #page11 { position: relative; background: #000; }
  .p11-video {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover; z-index: 1;
  }
  .p11-success-img {
    position: absolute; left: 50%; top: 117px;
    width: 385px; height: 108px;
    transform: translateX(-50%);
    z-index: 20; opacity: 0;
    transition: opacity 0.5s ease; pointer-events: none;
  }
  .p11-success-img.visible { opacity: 1; }
  .p11-success-img img { width: 385px; height: 108px; object-fit: contain; }
  .p11-danmaku-container {
    position: absolute; top: 30px; left: 0;
    width: 750px; height: 350px;
    z-index: 9999; pointer-events: none; overflow: visible;
  }
  .p11-danmaku {
    position: absolute; color: #fff; font-size: 28px;
    white-space: nowrap;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
    animation: danmakuMove linear forwards; opacity: 0.95;
  }
  @keyframes danmakuMove { from { transform: translateX(750px); } to { transform: translateX(-100%); } }
  .p11-bottom-bar {
    position: absolute; bottom: 0; left: 0;
    width: 750px; z-index: 5;
    display: flex; flex-direction: column;
  }
  .p11-progress-bar {
    width: 750px; height: 3px;
    background: rgba(255,255,255,0.15);
    position: relative; z-index: 6;
  }
  .p11-progress-fill {
    height: 100%; background: rgba(255,255,255,0.6);
    width: 0%; transition: width 0.3s linear;
  }
  .p11-info-row {
    display: flex; align-items: center;
    padding: 16px 30px; gap: 16px;
  }
  .p11-avatar {
    width: 72px; height: 72px; border-radius: 50%;
    object-fit: cover; border: 2px solid #fff; flex-shrink: 0;
  }
  .p11-account-name { color: #fff; font-size: 26px; font-weight: bold; }
  .p11-caption { color: #fff; font-size: 28px; line-height: 1.5; padding: 0 30px 16px 30px; }
  .p11-likes-img { width: 750px; height: auto; display: block; object-fit: contain; }
  /* 5继续.png: 无灰框，图层最上面，透明度100% */
  .p11-continue-btn {
    position: absolute; bottom: 400px; left: 50%;
    transform: translateX(-50%);
    width: 220px; height: auto;
    z-index: 999999; opacity: 0;
    transition: opacity 0.6s ease; cursor: pointer;
    pointer-events: none;
  }
  .p11-continue-btn.visible { opacity: 1 !important; pointer-events: auto !important; }
  .p11-continue-btn img { width: 220px; height: auto; object-fit: contain; display: block; }

  /* ===== 页面12：卡片轮播 ===== */
  #page12 { position: relative; overflow: hidden; }
  .card-carousel {
    position: absolute;
    top: 420px; left: 0;
    width: 750px; height: 750px;
    perspective: 1200px;
    overflow: visible;
  }
  .card-wrapper {
    position: absolute;
    width: 380px; height: 570px;
    top: 0; left: 50%;
    margin-left: -190px;
    transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94),
                opacity 0.5s ease;
    cursor: pointer;
    transform-style: preserve-3d;
  }
  .card-inner {
    position: relative;
    width: 100%; height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.4,0,0.2,1);
  }
  .card-wrapper.flipped .card-inner {
    transform: rotateY(180deg);
  }
  .card-face {
    position: absolute;
    width: 100%; height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    overflow: hidden;
  }
  .card-face.card-front {
    box-shadow: 5px 8px 20px rgba(30,30,30,0.9),
                -3px -3px 10px rgba(30,30,30,0.5),
                0 0 30px rgba(0,0,0,0.4);
  }
  .card-face.card-front img {
    width: 100%; height: 100%;
    object-fit: cover; border-radius: 16px;
  }
  .card-face.card-back {
    transform: rotateY(180deg);
    border: 3px solid rgba(255,255,255,0.85);
    border-radius: 16px;
    box-shadow: 0 0 25px rgba(255,255,255,0.6),
                0 0 50px rgba(255,255,255,0.25),
                0 0 80px rgba(255,255,255,0.1),
                inset 0 0 20px rgba(255,255,255,0.15);
  }
  .card-face.card-back img {
    width: 100%; height: 100%;
    object-fit: cover; border-radius: 13px;
  }
  /* 卡面下方PNG标签 */
  .card-png-label {
    position: absolute;
    top: calc(100% + 30px);
    left: 50%; transform: translateX(-50%);
    opacity: 0;
    transition: opacity 0.8s ease 0.4s;
    pointer-events: none;
    z-index: 20;
  }
  .card-png-label.visible { opacity: 1; }
  .card-png-label img { object-fit: contain; display: block; }
  /* 滑动提示 */
  .swipe-hint {
    position: absolute;
    bottom: 120px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.6);
    font-size: 26px;
    animation: swipeHint 2.5s ease-in-out infinite;
    white-space: nowrap;
    text-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  /* 5下一页.png: 9%线性→172×63, PS坐标(480,1187) */
  .p12-next-btn {
    position: absolute; left: 480px; top: 1187px;
    width: 172px; height: 63px;
    z-index: 30; opacity: 0;
    transition: opacity 0.6s ease; cursor: pointer;
    pointer-events: none;
  }
  .p12-next-btn.visible { opacity: 1; pointer-events: auto; }
  .p12-next-btn img { width: 172px; height: 63px; object-fit: contain; }

  /* ===== 页面13 ===== */
  #page13 { position: relative; }
  .p13-character {
    position: absolute; left: 0; bottom: 0;
    width: 750px; z-index: 5;
    transition: opacity 0.8s ease;
  }
  .p13-character.hidden { opacity: 0; }
  .p13-character img { width: 750px; display: block; }
  .p13-dialog {
    position: absolute; left: 50%; top: 916px;
    width: 660px; height: 316px;
    transform: translateX(-50%);
    z-index: 10; opacity: 0;
    transition: opacity 0.8s ease;
  }
  .p13-dialog.visible { opacity: 1; }
  .p13-dialog.hidden { opacity: 0; }
  .p13-dialog img {
    width: 660px; height: 316px;
    object-fit: contain; z-index: 1;
    opacity: 0.9;
  }
  .p13-dialog-text {
    position: absolute; left: 90px; top: 90px;
    width: 460px; color: #4A2C0A;
    font-size: 26px; line-height: 1.7;
    text-align: left; z-index: 3;
  }
  .p13-dialog-text .typing-cursor { background: #4A2C0A; height: 26px; }
  .p13-view-btn {
    position: absolute; left: 50%; bottom: 25px;
    width: 191px; height: 70px;
    transform: translateX(-50%);
    z-index: 15; opacity: 0;

<script>
  // ===== 视口自适应缩放 =====
  const DESIGN_W = 750;
  const DESIGN_H = 1440;
  const app = document.getElementById('app');

  function resizeApp() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const scale = Math.min(vw / DESIGN_W, vh / DESIGN_H);
    app.style.width = DESIGN_W + 'px';
    app.style.height = DESIGN_H + 'px';
    app.style.transform = 'translate(-50%, -50%) scale(' + scale + ')';
    app.style.transformOrigin = 'center center';
  }
  
  function handleResize() {
    resizeApp();
  }
  
  window.addEventListener('resize', handleResize);
  window.addEventListener('orientationchange', handleResize);
  window.addEventListener('load', resizeApp);
  resizeApp();

  // ===== 全局状态 =====
  let currentPage = '1';
  let nickname = '';
  let isTyping = false;
  let dialogStep = 1;
  function getAppScale() {
    return Math.min(window.innerWidth / DESIGN_W, window.innerHeight / DESIGN_H);
  }

  // ===== 阻止手机端默认触摸行为（防止背景移动） =====
  document.addEventListener('touchmove', function(e) {
    e.preventDefault();
  }, { passive: false });

  // ===== 背景音乐系统 =====
  const bgmAudio = new Audio('花日.mp3');
  bgmAudio.loop = true;
  bgmAudio.volume = 0.4;
  let bgmPlaying = false;
  let bgmEnabled = true;
  let bgmFirstPlay = true;

  function startBgm() {
    if (!bgmEnabled) return;
    bgmPlaying = true;
    bgmAudio.play().catch(() => {});
  }
  function pauseBgm() {
    bgmPlaying = false;
    bgmAudio.pause();
  }
  function resumeBgm() {
    if (!bgmEnabled || bgmPlaying) return;
    bgmPlaying = true;
    bgmAudio.play().catch(() => {});
  }

  const bgmToggle = document.getElementById('bgmToggle');
  bgmToggle.addEventListener('click', function() {
    bgmEnabled = !bgmEnabled;
    if (bgmEnabled) {
      this.classList.remove('off');
      if (shouldBgmPlay(currentPage)) startBgm();
    } else {
      this.classList.add('off');
      pauseBgm();
    }
  });

  function shouldBgmPlay(page) {
    // No 花日bgm: 3,4,5,6,7,9,11,5b,14
    // With 花日bgm: 1,2,8,4b,6b,12,13
    const noBgm = ['3','4','5','6','7','9','11','5b','14','15'];
    return !noBgm.includes(page);
  }

  // ===== 页面14专属音乐：升华.mp3 =====
  const shenghuaAudio = new Audio('升华.mp3');
  shenghuaAudio.loop = true;
  shenghuaAudio.volume = 0.5;

  // ===== 页面4-7专属音乐 =====
  const pageMusic = {
    '4': new Audio('学校音乐.mp3'),
    '5': new Audio('排练室音乐.mp3'),
    '6': new Audio('志愿点音乐.mp3'),
    '7': new Audio('琴房音乐.mp3')
  };
  let currentPageMusic = null;

  function playPageMusic(page) {
    if (currentPageMusic) { currentPageMusic.pause(); currentPageMusic.currentTime = 0; }
    currentPageMusic = pageMusic[page];

    '4': `一岁多时，一场意外的医疗事故灼伤视神经，小熊眼前只剩下微弱的光感。妈妈买来一架电子琴，清脆的琴声，成了她童年最温暖的底色，也成了她与世界对话的第一种方式。\n\n六岁那年，小熊偶然听见了真实的钢琴声。比电子琴更灵动的音色深深打动了她。从那一刻起，她坚定了学琴的心意。\n\n小熊以惊人的记忆力与不懈坚持，在黑白琴键间追逐音乐梦想。一路走来，她斩获上海国际青少年钢琴大赛冠军，也曾有幸与钢琴大师郎朗同台演出。\n\n小熊常说，音乐是她的全部。琴声响起，她就能听见花开的声音，看见世界的模样。\n\n真正的看见，从不是怜悯的凝视，而是平等的理解，是看见每一个困境里，永不熄灭的生命力。`,

    if (from === '15') {
      document.getElementById('p15Video').pause();
      shenghuaAudio.pause();
      shenghuaAudio.currentTime = 0;
    }

    // 背景音乐管理
    if (shouldBgmPlay(from) && !shouldBgmPlay(to)) pauseBgm();
    if (!shouldBgmPlay(from) && shouldBgmPlay(to)) resumeBgm();

    // 页面专属音乐：离开4/5/6/7时停止

    if (skipAnim) {
      fromEl.classList.remove('active', 'page-leave', 'page-enter');
      toEl.classList.remove('page-leave');
      toEl.classList.add('active', 'page-enter');
      currentPage = to;
      onPageEnter(to);
      return;
    }

    fromEl.classList.add('page-leave');
    setTimeout(() => {
      fromEl.classList.remove('active', 'page-leave');
      toEl.classList.add('active', 'page-enter');
      currentPage = to;
      onPageEnter(to);
    }, 400);

  // ===== 打字机 =====
  function typeText(text, callback, textEl) {
    isTyping = true;
    const el = textEl || document.getElementById('dialogText');
    el.innerHTML = '';
    let i = 0;
    const cursor = '<span class="typing-cursor"></span>';
    function type() {
      if (i < text.length) {
        el.innerHTML = text.substring(0, i+1).replace(/\n/g, '<br>') + cursor;
        i++;
        setTimeout(type, 40);
      } else {
        el.innerHTML = text.replace(/\n/g, '<br>');
        isTyping = false;
        if (callback) callback();
      }
    }
    type();
  }

  function updateSoundIcons() {
    document.querySelectorAll('.sound-icon').forEach((icon, idx) => {
      if (matchedIcons.has(idx)) { icon.classList.add('matched'); icon.classList.remove('disabled','selected'); return; }
      if (selectedIcon !== null && selectedIcon !== idx) { icon.classList.add('disabled'); icon.classList.remove('selected'); }
      else if (selectedIcon === idx) { icon.classList.remove('disabled'); icon.classList.add('selected'); }
      else { icon.classList.remove('disabled','selected','matched'); }
    });
  }

  // ===== 拖拽交互 =====
  document.querySelectorAll('.sound-icon').forEach(icon => {
    icon.addEventListener('mousedown', onPointerDown);
    icon.addEventListener('touchstart', onPointerDown, { passive: false });
  });
  document.addEventListener('mousemove', onPointerMove);
  document.addEventListener('touchmove', onPointerMove, { passive: false });
  document.addEventListener('mouseup', onPointerUp);
  document.addEventListener('touchend', onPointerUp, { passive: false });

  let dragState = { active:false, icon:null, idx:-1, startCX:0, startCY:0, hasMoved:false };

  function getPointerPos(e) {
    if (e.touches && e.touches.length>0) return {x:e.touches[0].clientX,y:e.touches[0].clientY};
    if (e.changedTouches && e.changedTouches.length>0) return {x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY};
    return {x:e.clientX,y:e.clientY};
  }

  function clientToDesign(cx, cy) {
    const scale = getAppScale();
    const rect = app.getBoundingClientRect();
    return { x: (cx - rect.left) / scale, y: (cy - rect.top) / scale };
  }

  function onPointerDown(e) {
    const icon = e.currentTarget;
    const idx = parseInt(icon.dataset.index);
    if (matchedIcons.has(idx)) return;
    e.preventDefault();
    const pos = getPointerPos(e);
    if (selectedIcon === null || selectedIcon !== idx) {
      selectedIcon = idx;
      updateSoundIcons();
      playCurrentAudio();
    }
    dragState = { active:true, icon:icon, idx:idx, startCX:pos.x, startCY:pos.y, hasMoved:false };
  }

  function onPointerMove(e) {
    if (!dragState.active) return;
    e.preventDefault();
    const pos = getPointerPos(e);
    if (!dragState.hasMoved) {
      const dx = pos.x - dragState.startCX, dy = pos.y - dragState.startCY;
      if (Math.sqrt(dx*dx + dy*dy) < 10) return;
      dragState.hasMoved = true;
      dragState.icon.classList.add('dragging');
      dragState.icon.style.position = 'absolute';
      dragState.icon.style.zIndex = '200';
      dragState.icon.style.transition = 'none';
    }
    const dp = clientToDesign(pos.x, pos.y);
    dragState.icon.style.left = (dp.x - 75) + 'px';
    dragState.icon.style.top = (dp.y - 73) + 'px';
    highlightDropZones(dp.x, dp.y);
  }

  function onPointerUp(e) {
    if (!dragState.active) return;
    const pos = getPointerPos(e);
    document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('highlight'));
    if (dragState.hasMoved) {
      dragState.icon.classList.remove('dragging');
      const dp = clientToDesign(pos.x, pos.y);
      const target = getDropTarget(dp.x, dp.y);
      if (target === pairSequence[currentPairIndex].building) {
        handleMatchSuccess(dragState.idx, target);
      } else {
        resetIconPosition(dragState.icon);
      }
    }
    dragState.active = false; dragState.hasMoved = false;
  }

  function playCurrentAudio() {
    if (currentPairIndex >= pairSequence.length) return;
    if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
    currentAudio = new Audio(pairSequence[currentPairIndex].audio);
    currentAudio.play().catch(() => {});
  }

  function highlightDropZones(dx, dy) {
    document.querySelectorAll('.drop-zone').forEach(zone => {
      if (zone.classList.contains('matched')) return;
      const zl = parseInt(zone.style.left), zt = parseInt(zone.style.top);
      const zw = parseInt(zone.style.width), zh = parseInt(zone.style.height);
      zone.classList.toggle('highlight', dx>=zl && dx<=zl+zw && dy>=zt && dy<=zt+zh);
    });
  }

  function getDropTarget(dx, dy) {
    for (const zone of document.querySelectorAll('.drop-zone')) {
      if (zone.classList.contains('matched')) continue;
      const zl = parseInt(zone.style.left), zt = parseInt(zone.style.top);
      const zw = parseInt(zone.style.width), zh = parseInt(zone.style.height);
      if (dx>=zl && dx<=zl+zw && dy>=zt && dy<=zt+zh) return zone.dataset.building;
    }
    return null;
  }

  // ===== 页面8 =====
  function startPage8() {
    document.getElementById('p8DialogContainer').classList.add('visible');
    setTimeout(() => {
      typeText('刚好来到琴房了，'+nickname+'，你可以帮我拍一段视频吗？我想发在我的账号上。', function() {
        document.getElementById('p8NextBtn').classList.add('visible');
      }, document.getElementById('p8DialogText'));
    }, 800);
  }

  document.getElementById('p8NextBtn').addEventListener('click', function() {
    this.classList.remove('visible');
    pauseBgm();
    switchPage('8', '9');
  });

  // ===== 页面9 =====
  let p9Recording = false;
  let p9Timer = null;

  function startPage9() {
    const video = document.getElementById('p9Video');
    video.pause(); video.currentTime = 0;
    video.classList.remove('blurred');
    document.getElementById('p9NextBtn').classList.remove('visible');
    document.getElementById('p9RecordBtn').style.display = '';
    document.getElementById('p9HintText').classList.remove('hidden');
    p9Recording = false;
  }

  document.getElementById('p9RecordBtn').addEventListener('click', function() {
    if (p9Recording) return;
    p9Recording = true;
    document.getElementById('p9HintText').classList.add('hidden');
    const video = document.getElementById('p9Video');
    video.muted = false;
    video.play().catch(() => {});
    p9Timer = setTimeout(() => {
      video.classList.add('blurred');
      document.getElementById('p9RecordBtn').style.display = 'none';
      document.getElementById('p9NextBtn').classList.add('visible');
    }, 10000);
  });

  document.getElementById('p9NextBtn').addEventListener('click', function() {
    if (p9Timer) { clearTimeout(p9Timer); p9Timer = null; }
    document.getElementById('p9Video').pause();
    this.classList.remove('visible');
    switchPage('9', '10');
  });

  // ===== 页面10 =====
  let selectedCaption = '';

  function startPage10() {
    selectedCaption = '';
    document.querySelectorAll('.p10-option').forEach(opt => opt.classList.remove('selected'));
    document.querySelector('.p10-custom-input').value = '';
  }

  document.querySelectorAll('.p10-option').forEach(opt => {
    opt.addEventListener('click', function() {
      document.querySelectorAll('.p10-option').forEach(o => o.classList.remove('selected'));
      this.classList.add('selected');
      if (this.classList.contains('p10-custom-option')) {
        this.querySelector('.p10-custom-input').focus();
        selectedCaption = this.querySelector('.p10-custom-input').value.trim();
      } else {
        selectedCaption = this.dataset.caption;
      }
    });
  });

  document.querySelector('.p10-custom-input').addEventListener('input', function() {
    if (this.closest('.p10-custom-option').classList.contains('selected')) {
      selectedCaption = this.value.trim();
    }
  });

  document.getElementById('p10PublishBtn').addEventListener('click', function() {
    if (document.querySelector('.p10-custom-option').classList.contains('selected') && !selectedCaption) return;
    if (!selectedCaption) return;
    switchPage('10', '11');
  });

  // ===== 页面11 =====
  let p11DanmakuInterval = null;
  let p11ProgressInterval = null;
  let p11VideoEnded = false;

  function startPage11() {
    const video = document.getElementById('p11Video');
    video.currentTime = 0;
    video.muted = false;
    video.loop = false;
    p11VideoEnded = false;
    document.getElementById('p11ContinueBtn').classList.remove('visible');
    video.play().catch(() => {});

    document.getElementById('p11Caption').textContent = selectedCaption;

    const successImg = document.getElementById('p11SuccessImg');
    successImg.classList.add('visible');
    setTimeout(() => successImg.classList.remove('visible'), 1500);

    video.onended = function() {
      if (p11VideoEnded) return;
      p11VideoEnded = true;
      document.getElementById('p11ContinueBtn').classList.add('visible');
      video.loop = true;
      video.play().catch(() => {});
    };

    startProgress();
    startDanmaku();
  }

  function startProgress() {
    const video = document.getElementById('p11Video');
    const fill = document.getElementById('p11ProgressFill');
    p11ProgressInterval = setInterval(() => {
      if (video.duration && video.currentTime) {
        fill.style.width = (video.currentTime / video.duration * 100) + '%';
      }
    }, 300);
  }

  function startDanmaku() {
    const container = document.getElementById('p11DanmakuContainer');
    container.innerHTML = '';
    const comments = [
      '姐姐唱的很棒呢姐姐加油！', '好听好听', '太厉害了', '加油！',
      '加油！相信你会越来越好', '好干净空灵的声音呀', '好歌喉',
      '加油，唱得好好听', '太厉害了', '真美丽 真可爱 真好听',
      '你的翻唱真的很好听！', '简直是天籁之音', '这手钢琴弹得太溜了', '钢琴练了多少年？'
    ];
    let idx = 0;
    function create() {
      const el = document.createElement('div');
      el.className = 'p11-danmaku';
      el.textContent = comments[idx % comments.length]; idx++;
      el.style.top = (10 + Math.random() * 320) + 'px';
      el.style.animationDuration = (6 + Math.random() * 4) + 's';
      container.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }
    create(); setTimeout(create, 500);
    p11DanmakuInterval = setInterval(create, 1500 + Math.random() * 1000);
  }

  document.getElementById('p11ContinueBtn').addEventListener('click', function() {
    this.classList.remove('visible');
    switchPage('11', '12');
  });

  // ===== 页面12：卡片轮播 =====
  const cardData = [
    { face: '10音乐生.jpg',     label: '12音乐生.png',     labelW: 288, labelH: 149 },
    { face: '10乐队主唱.jpg',   label: '12乐队主唱.png',   labelW: 289, labelH: 148 },
    { face: '10自媒体博主.jpg', label: '12自媒体.png',     labelW: 289, labelH: 147 },
    { face: '10志愿服务.jpg',   label: '12志愿者.png',     labelW: 302, labelH: 147 }
  ];

  let currentCardIdx = 0;
  let cardFlipped = false;
  let p12StartX = 0;
  let p12Swiping = false;
  let p12Inited = false;
  let p12NextTimer = null;

  function initPage12() {
    const carousel = document.getElementById('cardCarousel');

    if (!p12Inited) {
      p12Inited = true;
      cardData.forEach((card, i) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'card-wrapper';
        wrapper.dataset.index = i;
        wrapper.innerHTML =
          '<div class="card-inner">' +
            '<div class="card-face card-front"><img src="12卡背.jpg" alt="卡背"></div>' +
            '<div class="card-face card-back"><img src="' + card.face + '" alt="卡面"></div>' +
          '</div>' +
          '<div class="card-png-label" id="cardLabel' + i + '">' +
            '<img src="' + card.label + '" alt="标签" style="width:' + card.labelW + 'px;height:' + card.labelH + 'px;">' +
          '</div>';
        carousel.appendChild(wrapper);

        wrapper.addEventListener('click', function() {
          var idx = parseInt(this.dataset.index);
          if (getCardOffset(idx) === 0) {
            if (!cardFlipped) flipCard(idx);
            else if (this.classList.contains('flipped')) unflipCard(idx);
          }
        });
      });

      carousel.addEventListener('touchstart', function(e) {
        if (cardFlipped) return;
        p12StartX = e.touches[0].clientX;
        p12Swiping = true;
      }, { passive: true });
      carousel.addEventListener('touchend', function(e) {
        if (!p12Swiping || cardFlipped) return;
        p12Swiping = false;
        var dx = e.changedTouches[0].clientX - p12StartX;
        if (Math.abs(dx) > 50) {
          if (dx < 0) currentCardIdx = (currentCardIdx + 1) % 4;
          else currentCardIdx = (currentCardIdx - 1 + 4) % 4;
          renderCards();
        }
      }, { passive: true });

      carousel.addEventListener('mousedown', function(e) {
        if (cardFlipped) return;
        p12StartX = e.clientX; p12Swiping = true; e.preventDefault();
      });
      document.addEventListener('mouseup', function(e) {
        if (!p12Swiping || cardFlipped) { p12Swiping = false; return; }
        p12Swiping = false;
        var dx = e.clientX - p12StartX;
        if (Math.abs(dx) > 50) {
          if (dx < 0) currentCardIdx = (currentCardIdx + 1) % 4;
          else currentCardIdx = (currentCardIdx - 1 + 4) % 4;
          renderCards();
        }
      });
    }

    currentCardIdx = 0;
    cardFlipped = false;
    document.querySelectorAll('.card-wrapper').forEach(w => w.classList.remove('flipped'));
    document.querySelectorAll('.card-png-label').forEach(l => l.classList.remove('visible'));
    document.getElementById('p12NextBtn').classList.remove('visible');
    if (p12NextTimer) clearTimeout(p12NextTimer);
    p12NextTimer = setTimeout(function() {
      document.getElementById('p12NextBtn').classList.add('visible');
    }, 5000);
    renderCards();
  }

  function getCardOffset(index) {
    var diff = (index - currentCardIdx + 4) % 4;
    if (diff === 0) return 0;
    if (diff === 1) return 1;
    if (diff === 2) return 2;
    return -1;
  }

  function renderCards() {
    document.querySelectorAll('.card-wrapper').forEach(function(w, i) {
      var offset = getCardOffset(i);
      var tx = 0, scale = 1, opacity = 1, zi = 1;
      switch (offset) {
        case 0:  tx = 0; scale = 1; opacity = 1; zi = 10; w.style.pointerEvents = 'auto'; break;
        case 1:  tx = 300; scale = 0.82; opacity = 0.6; zi = 5; w.style.pointerEvents = 'none'; break;
        case -1: tx = -300; scale = 0.82; opacity = 0.6; zi = 5; w.style.pointerEvents = 'none'; break;
        case 2:  tx = 0; scale = 0.6; opacity = 0; zi = 0; w.style.pointerEvents = 'none'; break;
      }
      w.style.transform = 'translateX(' + tx + 'px) scale(' + scale + ')';
      w.style.opacity = opacity;
      w.style.zIndex = zi;
    });
  }

  function flipCard(index) {
    cardFlipped = true;
    var wrapper = document.querySelector('.card-wrapper[data-index="' + index + '"]');
    wrapper.classList.add('flipped');
    setTimeout(function() {
      document.getElementById('cardLabel' + index).classList.add('visible');
    }, 700);
  }

  function unflipCard(index) {
    cardFlipped = false;
    var wrapper = document.querySelector('.card-wrapper[data-index="' + index + '"]');
    document.getElementById('cardLabel' + index).classList.remove('visible');
    setTimeout(function() {
      wrapper.classList.remove('flipped');
    }, 200);
  }

  // 页面12：下一页按钮
  document.getElementById('p12NextBtn').addEventListener('click', function() {
    if (p12NextTimer) { clearTimeout(p12NextTimer); p12NextTimer = null; }
    this.classList.remove('visible');
    switchPage('12', '13');
  });

  // ===== 页面13 =====
  let p13Phase = 'dialog'; // dialog → gallery

  function initPage13() {
    p13Phase = 'dialog';
    document.getElementById('p13Dialog').classList.remove('visible', 'hidden');
    document.getElementById('p13DialogText').innerHTML = '';
    document.getElementById('p13ViewBtn').classList.remove('visible', 'hidden');
    document.getElementById('p13Character').classList.remove('hidden');
    document.getElementById('p13Gallery').classList.remove('visible');
    document.getElementById('p13ListenBtn').classList.remove('visible');
    document.getElementById('p13GalleryHint').classList.remove('visible');    // 对话框渐显
    setTimeout(function() {
      document.getElementById('p13Dialog').classList.add('visible');
      setTimeout(function() {
        typeText(nickname + '，谢谢你陪我度过这一天，与我一起协作完成了所有作品。', function() {
          document.getElementById('p13ViewBtn').classList.add('visible');
        }, document.getElementById('p13DialogText'));
      }, 500);
    }, 800);
  }

  // 点击查看成果→进入画廊模式
  document.getElementById('p13ViewBtn').addEventListener('click', function() {
    if (p13Phase !== 'dialog') return;
    p13Phase = 'gallery';
    this.classList.add('hidden');
    // 所有对话相关元素渐隐
    document.getElementById('p13Character').classList.add('hidden');
    document.getElementById('p13Dialog').classList.add('hidden');
    document.getElementById('p13ViewBtn').classList.add('hidden');

    // 画廊和听心声按钮渐显
    setTimeout(function() {
      document.getElementById('p13Gallery').classList.add('visible');
      document.getElementById('p13ListenBtn').classList.add('visible');
      document.getElementById('p13GalleryHint').classList.add('visible');
    }, 800);
  });

  // 画廊点击放大/缩小（统一尺寸259×460 → 337×600）
  document.getElementById('p13MapItem').addEventListener('click', function() {
    if (this.classList.contains('zoomed')) {
      this.classList.remove('zoomed');
    } else {
      document.querySelectorAll('.p13-gallery-item.zoomed').forEach(i => i.classList.remove('zoomed'));
      this.classList.add('zoomed');
    }
  });
  document.getElementById('p13ShowItem').addEventListener('click', function() {
    if (this.classList.contains('zoomed')) {
      this.classList.remove('zoomed');
    } else {
      document.querySelectorAll('.p13-gallery-item.zoomed').forEach(i => i.classList.remove('zoomed'));
      this.classList.add('zoomed');
    }
  });

  // 点击听心声→跳转页面14
  document.getElementById('p13ListenBtn').addEventListener('click', function() {
    shenghuaAudio.play().catch(() => {});
    switchPage('13', '14');
  });

  // ===== 页面14 =====
  const p14DialogLines = [
    '我不需要过度的同情怜悯，\n也不需要过度的拔高赞美。',
    '看不见不代表我感受不到这个世界，\n琴声、风声、善意，都能充盈我的生活。',
    '世界有看得见的风景，\n也有依靠听觉、触觉感知的天地。',
    '残障只是不同的生命状态，\n不是定义人的标签。',
    '愿我们都能抛开固有标签，\n看见每一个完整、鲜活的普通人。',
    '谢谢你，走进我有声有热爱的世界。'
  ];
  let p14LineIndex = 0;

  function initPage14() {
    p14LineIndex = 0;
    document.getElementById('p14Dialog').classList.remove('visible');
    document.getElementById('p14DialogText').innerHTML = '';
    document.getElementById('p14EndBtn').classList.remove('visible');
    // 对话框渐显
    setTimeout(function() {
      document.getElementById('p14Dialog').classList.add('visible');
      setTimeout(function() {
        typeText(p14DialogLines[0], function() {
          p14LineIndex = 1;
        }, document.getElementById('p14DialogText'));
      }, 500);
    }, 800);
  }

  // 点击对话框区域切换下一句
  document.getElementById('p14DialogText').addEventListener('click', function() {
    if (isTyping) { isTyping = false; return; }
    if (p14LineIndex < p14DialogLines.length) {
      this.innerHTML = '';
      typeText(p14DialogLines[p14LineIndex], function() {
        p14LineIndex++;
        if (p14LineIndex >= p14DialogLines.length) {
          // 所有对话完成 → 结束按钮渐显
          document.getElementById('p14EndBtn').classList.add('visible');
        }
      }, this);
    }
  });

  // 点击结束按钮→页面15
  document.getElementById('p14EndBtn').addEventListener('click', function() {
    switchPage('14', '15');
  });

  // ===== 页面15 =====
  function initPage15() {
    const video = document.getElementById('p15Video');
    video.play().catch(() => {});
  }

  // ===== 启动 =====
  onPageEnter('1');
</script>
</body>
</html>
